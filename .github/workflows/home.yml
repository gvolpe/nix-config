name: Home

on:
  pull_request:
  push:
    branches:
      - master
    paths-ignore:
      - 'GNOME.md'
      - 'README.md'
      - 'notes/**'
      - '.git-crypt/**'
      - '.gitattributes'
      - '.gitignore'
      - 'system/**'
      - 'outputs/os.nix'
      - 'switch'
      - '.mergify.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        config_name:
          - niri-edp
          - niri-hdmi
          - hyprland-edp
          - hyprland-hdmi
          - hyprland-hdmi-mutable
          - xmonad-edp
          - xmonad-hdmi

    steps:
      - uses: actions/checkout@v2.3.2

      - name: "Free disk space for Nix"
        uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: 'cleave' # holster, carve, cleave (default), rampage

      - name: "Install Nix ❄️"
        uses: cachix/install-nix-action@v31.8.4
        with:
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes ca-derivations
            trusted-users = root runner

      - name: "Install Cachix ❄️"
        uses: cachix/cachix-action@v16
        with:
          name: gvolpe-nixos
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      # Needed because cachix is also installed by Home Manager
      - name: "Set priority flag for Cachix 🚩"
        run: nix-env --set-flag priority 0 cachix

      - name: "Build ${{ matrix.config_name }} Home Manager config 🏠"
        run: nix build .#homeConfigurations.${{ matrix.config_name }}.activationPackage -L --accept-flake-config

name: NixOS

on:
  pull_request:
    paths-ignore:
      - 'home/**'
  push:
    branches:
      - master
    paths-ignore:
      - 'GNOME.md'
      - 'README.md'
      - 'notes/**'
      - '.git-crypt/**'
      - '.gitattributes'
      - '.gitignore'
      - 'home/**'
      - 'outputs/hm.nix'
      - 'switch'
      - '.mergify.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        hostname:
          - aorus
          - dell-xps
          - thinkpad-x1
          - tongfang-amd
          - xmod

    steps:
      - uses: actions/checkout@v2.3.2

      - name: "Free disk space for Nix"
        uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: 'cleave' # holster, carve, cleave (default), rampage

      - name: "Install Nix ❄️"
        uses: cachix/install-nix-action@v31.8.4
        with:
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes ca-derivations
            trusted-users = root runner

      - name: "Install Cachix ❄️"
        uses: cachix/cachix-action@v16
        with:
          name: gvolpe-nixos
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      # Needed because cachix is also installed by Home Manager
      - name: "Set priority flag for Cachix 🚩"
        run: nix-env --set-flag priority 0 cachix

      - name: "Build ${{ matrix.config_name }} NixOS config ❄️"
        run: |
          if [[ "${{ matrix.hostname }}" == "xmod" ]]; then
            nix build .#nixosConfigurations.${{ matrix.hostname }}.config.system.build.vm -L
          else
            nix build .#nixosConfigurations.${{ matrix.hostname }}.config.system.build.toplevel -L
          fi
